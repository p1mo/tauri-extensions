"$schema" = "schemas/schema.json"

[[set]]
identifier = "default"
description = """This enables window minimize, toggle-maximize, close commands."""
permissions = [
    "core:window:allow-show"
]

[[permission]]
identifier = "allow-show-window-js"
description = "Enables the show_window command."
commands.allow = ["show_window"]


[[permission]]
identifier = "deny-show-window-js"
description = "Denies the show_window command."
commands.deny = ["show_window"]